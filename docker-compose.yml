services:
  postgres:
    image: postgres:16-alpine
    container_name: study_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyapp123}
      POSTGRES_DB: ${POSTGRES_DB:-studyapp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
